<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Ganancia de Peso - Gestantes con Obesidad</title>
    <!-- Incluimos Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Colores en tonos dorado/amarillo oscuro para legibilidad, manteniendo el tema visual de OBESIDAD */
            --primary: #b38f00; 
            --primary-hover: #8f7300;
            --chart-fill: rgba(255, 235, 59, 0.6); /* Amarillo brillante de la gráfica */
            --bg: #f4f4f9;
            --text: #333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: var(--primary);
        }
        .subtitle {
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        @media(max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .panel {
            background: #fafafa;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
            border-top: 4px solid var(--primary);
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #ccc; cursor: not-allowed; text-shadow: none; color: #666;}
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th { background-color: #fffde7; color: var(--primary); } 
        .status-bajo { color: #d9534f; font-weight: bold; }
        .status-adec { color: var(--primary-hover); font-weight: bold; } 
        .status-alto { color: #f0ad4e; font-weight: bold; }
        
        .chart-container {
            position: relative;
            height: 600px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MONITOREO DE GANANCIA DE PESO EN GESTANTES CON OBESIDAD</h1>
    <div class="subtitle">IMC PG &ge; 30,0 kg/m²</div>

    <div class="grid">
        <!-- Columna Izquierda: Controles y Datos -->
        <div>
            <div class="panel">
                <h2>1. Datos Pregestacionales</h2>
                <div class="form-group">
                    <label>Tipo de Embarazo:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="tipoEmbarazo" value="unico" checked onchange="cambiarTipoEmbarazo()"> Único</label>
                        <label><input type="radio" name="tipoEmbarazo" value="multiple" onchange="cambiarTipoEmbarazo()"> Múltiple</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Peso Pregestacional (kg):</label>
                    <input type="number" id="pesoPG" step="0.1" placeholder="Ej. 85.5">
                </div>
                <div class="form-group">
                    <label>Talla (m):</label>
                    <input type="number" id="talla" step="0.01" placeholder="Ej. 1.60">
                </div>
                <button onclick="fijarDatosBase()">Guardar Datos Base</button>
                <p id="infoIMC" style="font-weight: bold; margin-top: 10px; text-align: center; color: var(--primary);"></p>
            </div>

            <div class="panel">
                <h2>2. Registro Semanal</h2>
                <div class="form-group">
                    <label>Semana de gestación (1-40):</label>
                    <input type="number" id="semana" min="1" max="40" disabled>
                </div>
                <div class="form-group">
                    <label>Peso Actual (kg):</label>
                    <input type="number" id="pesoActual" step="0.1" disabled>
                </div>
                <button id="btnAgregar" onclick="agregarRegistro()" disabled>Agregar Registro</button>
            </div>

            <div class="panel" style="max-height: 400px; overflow-y: auto;">
                <h2>Tabla de Monitoreo</h2>
                <table id="tablaRegistros">
                    <thead>
                        <tr>
                            <th>Semana</th>
                            <th>Peso (kg)</th>
                            <th>Ganancia</th>
                            <th>Calificación</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Filas dinámicas -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Columna Derecha: Gráfica -->
        <div class="panel">
            <div class="chart-container">
                <canvas id="graficaMonitoreo"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // Datos extraídos de la Tabla PDF (Obesidad - Único y Múltiple)
    // Formato: { semana: { u: [min, max], m: [min, max] } }
    const datos = {
        1: { u: [0.0, 0.1], m: [null, null] }, 2: { u: [0.0, 0.3], m: [null, null] }, 3: { u: [0.1, 0.4], m: [null, null] },
        4: { u: [0.1, 0.6], m: [null, null] }, 5: { u: [0.1, 0.7], m: [null, null] }, 6: { u: [0.2, 0.9], m: [null, null] },
        7: { u: [0.2, 1.0], m: [null, null] }, 8: { u: [0.3, 1.2], m: [null, null] }, 9: { u: [0.3, 1.3], m: [null, null] },
        10: { u: [0.3, 1.5], m: [null, null] }, 11: { u: [0.4, 1.6], m: [null, null] }, 12: { u: [0.4, 1.8], m: [null, null] },
        13: { u: [0.5, 2.0], m: [null, null] }, 14: { u: [0.6, 2.2], m: [0.8, 2.6] }, 15: { u: [0.8, 2.5], m: [1.2, 3.2] },
        16: { u: [1.0, 2.7], m: [1.6, 3.8] }, 17: { u: [1.1, 3.0], m: [2.0, 4.5] }, 18: { u: [1.3, 3.2], m: [2.4, 5.1] },
        19: { u: [1.5, 3.5], m: [2.8, 5.7] }, 20: { u: [1.6, 3.8], m: [3.2, 6.4] }, 21: { u: [1.8, 4.0], m: [3.6, 7.0] },
        22: { u: [2.0, 4.3], m: [4.0, 7.6] }, 23: { u: [2.1, 4.5], m: [4.3, 8.2] }, 24: { u: [2.3, 4.8], m: [4.7, 8.9] },
        25: { u: [2.5, 5.1], m: [5.1, 9.5] }, 26: { u: [2.6, 5.3], m: [5.5, 10.1] }, 27: { u: [2.8, 5.6], m: [5.9, 10.8] },
        28: { u: [3.0, 5.8], m: [6.3, 11.4] }, 29: { u: [3.1, 6.1], m: [6.7, 12.0] }, 30: { u: [3.3, 6.4], m: [7.1, 12.7] },
        31: { u: [3.5, 6.6], m: [7.5, 13.3] }, 32: { u: [3.6, 6.9], m: [7.8, 13.9] }, 33: { u: [3.8, 7.1], m: [8.2, 14.5] },
        34: { u: [4.0, 7.4], m: [8.6, 15.2] }, 35: { u: [4.1, 7.7], m: [9.0, 15.8] }, 36: { u: [4.3, 7.9], m: [9.4, 16.4] },
        37: { u: [4.5, 8.2], m: [9.8, 17.1] }, 38: { u: [4.6, 8.4], m: [10.2, 17.7] }, 39: { u: [4.8, 8.7], m: [10.6, 18.3] },
        40: { u: [5.0, 9.0], m: [11.0, 19.0] }
    };

    let pesoPregestacional = 0;
    let registrosUsuario = [];
    let chartInstance = null;
    let tipoEmbarazoActual = 'unico';

    // Inicializar la Gráfica
    function initChart() {
        const ctx = document.getElementById('graficaMonitoreo').getContext('2d');
        const semanas = Array.from({length: 40}, (_, i) => i + 1);
        
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: semanas,
                datasets: [
                    {   
                        label: 'Límite Superior',
                        data: [],
                        borderColor: 'transparent',
                        backgroundColor: 'rgba(255, 235, 59, 0.6)', // Amarillo característico
                        fill: '+1', 
                        pointRadius: 0,
                        tension: 0.1
                    },
                    {   
                        label: 'Límite Inferior',
                        data: [],
                        borderColor: 'transparent',
                        backgroundColor: 'transparent',
                        fill: false,
                        pointRadius: 0,
                        tension: 0.1
                    },
                    {   
                        label: 'Ganancia del Paciente (kg)',
                        data: [],
                        borderColor: '#111',
                        backgroundColor: '#111',
                        borderWidth: 2,
                        pointRadius: 4,
                        fill: false,
                        tension: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { title: { display: true, text: 'Semanas de gestación' }, grid: { color: '#ccc' }, ticks: { stepSize: 1 } },
                    y: { title: { display: true, text: 'Ganancia de Peso (kg)' }, min: -4, max: 25, grid: { color: '#ccc' }, ticks: { stepSize: 1 } }
                },
                plugins: { legend: { display: false } }
            }
        });
        
        actualizarLimitesGrafica();
    }

    function cambiarTipoEmbarazo() {
        tipoEmbarazoActual = document.querySelector('input[name="tipoEmbarazo"]:checked').value;
        actualizarLimitesGrafica();
        registrosUsuario.forEach(reg => {
            reg.calificacion = evaluarCalificacion(reg.semana, reg.ganancia);
        });
        actualizarTabla();
    }

    function actualizarLimitesGrafica() {
        const semanas = Array.from({length: 40}, (_, i) => i + 1);
        const dataMin = semanas.map(s => tipoEmbarazoActual === 'unico' ? datos[s].u[0] : (datos[s].m[0] ?? null));
        const dataMax = semanas.map(s => tipoEmbarazoActual === 'unico' ? datos[s].u[1] : (datos[s].m[1] ?? null));

        chartInstance.data.datasets[0].data = dataMax;
        chartInstance.data.datasets[1].data = dataMin;
        chartInstance.update();
    }

    function fijarDatosBase() {
        const pesoPGInput = parseFloat(document.getElementById('pesoPG').value);
        const tallaInput = parseFloat(document.getElementById('talla').value);

        if (!pesoPGInput || !tallaInput) {
            alert("Por favor ingrese el Peso Pregestacional y la Talla."); return;
        }

        const imc = pesoPGInput / (tallaInput * tallaInput);
        
        // Validación adaptada a OBESIDAD (>= 30.0)
        if(imc < 30.0) {
            alert(`Advertencia: Esta ficha es para gestantes con OBESIDAD (IMC ≥ 30.0). El IMC calculado es ${imc.toFixed(1)}`);
        }

        pesoPregestacional = pesoPGInput;
        document.getElementById('infoIMC').innerHTML = `IMC PG: ${imc.toFixed(1)} kg/m² | Peso Base: ${pesoPregestacional} kg`;
        
        document.getElementById('semana').disabled = false;
        document.getElementById('pesoActual').disabled = false;
        document.getElementById('btnAgregar').disabled = false;
    }

    function evaluarCalificacion(semana, ganancia) {
        const limites = tipoEmbarazoActual === 'unico' ? datos[semana].u : datos[semana].m;
        if (!limites || limites[0] === null) return "-"; 
        
        if (ganancia < limites[0]) return "Bajo";
        if (ganancia > limites[1]) return "Alto";
        return "Adec.";
    }

    function agregarRegistro() {
        const semana = parseInt(document.getElementById('semana').value);
        const pesoActual = parseFloat(document.getElementById('pesoActual').value);

        if (!semana || semana < 1 || semana > 40) { alert("Semana inválida (1 a 40)"); return; }
        if (!pesoActual) { alert("Ingrese el peso actual"); return; }

        const ganancia = (pesoActual - pesoPregestacional).toFixed(2);
        const calificacion = evaluarCalificacion(semana, ganancia);
        const existente = registrosUsuario.findIndex(r => r.semana === semana);

        const nuevoRegistro = {
            semana: semana,
            peso: pesoActual,
            ganancia: parseFloat(ganancia),
            calificacion: calificacion
        };

        if (existente >= 0) {
            registrosUsuario[existente] = nuevoRegistro;
        } else {
            registrosUsuario.push(nuevoRegistro);
        }

        registrosUsuario.sort((a, b) => a.semana - b.semana);

        actualizarTabla();
        actualizarPuntosGrafica();
        
        document.getElementById('semana').value = semana + 1;
        document.getElementById('pesoActual').value = "";
    }

    function eliminarRegistro(semana) {
        registrosUsuario = registrosUsuario.filter(r => r.semana !== semana);
        actualizarTabla();
        actualizarPuntosGrafica();
    }

    function actualizarTabla() {
        const tbody = document.querySelector("#tablaRegistros tbody");
        tbody.innerHTML = "";

        registrosUsuario.forEach(reg => {
            let claseEstatus = "";
            if (reg.calificacion === "Bajo") claseEstatus = "status-bajo";
            if (reg.calificacion === "Alto") claseEstatus = "status-alto";
            if (reg.calificacion === "Adec.") claseEstatus = "status-adec";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${reg.semana}</td>
                <td>${reg.peso}</td>
                <td>${reg.ganancia > 0 ? '+' : ''}${reg.ganancia}</td>
                <td class="${claseEstatus}">${reg.calificacion}</td>
                <td><button onclick="eliminarRegistro(${reg.semana})" style="padding:2px 5px; margin:0; background:#d9534f; width:auto; text-shadow:none;">X</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function actualizarPuntosGrafica() {
        let datosGrafica = Array.from({length: 40}, () => null);
        registrosUsuario.forEach(reg => {
            datosGrafica[reg.semana - 1] = reg.ganancia;
        });
        chartInstance.data.datasets[2].data = datosGrafica;
        chartInstance.update();
    }

    window.onload = initChart;

</script>

</body>
</html>
