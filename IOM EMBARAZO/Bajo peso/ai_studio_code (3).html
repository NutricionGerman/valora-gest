<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Ganancia de Peso en Gestantes (Delgadez)</title>
    <!-- Incluimos Chart.js para la gráfica -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #c9002b; /* Rojo Minsa */
            --bg: #f4f4f9;
            --text: #333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: var(--primary);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        @media(max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .panel {
            background: #fafafa;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background-color: #a00022; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th { background-color: #f0f0f0; }
        .status-bajo { color: #d9534f; font-weight: bold; }
        .status-adec { color: #5cb85c; font-weight: bold; }
        .status-alto { color: #f0ad4e; font-weight: bold; }
        
        .chart-container {
            position: relative;
            height: 600px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MONITOREO DE GANANCIA DE PESO EN GESTANTES CON DELGADEZ</h1>
    <p style="text-align: center;">IMC PG &lt; 18,5 kg/m²</p>

    <div class="grid">
        <!-- Columna Izquierda: Controles y Datos -->
        <div>
            <div class="panel">
                <h2>1. Datos Pregestacionales</h2>
                <div class="form-group">
                    <label>Peso Pregestacional (kg):</label>
                    <input type="number" id="pesoPG" step="0.1" placeholder="Ej. 45.5">
                </div>
                <div class="form-group">
                    <label>Talla (m):</label>
                    <input type="number" id="talla" step="0.01" placeholder="Ej. 1.55">
                </div>
                <button onclick="fijarDatosBase()">Guardar Datos Base</button>
                <p id="infoIMC" style="font-weight: bold; margin-top: 10px; text-align: center;"></p>
            </div>

            <div class="panel">
                <h2>2. Registro Semanal</h2>
                <div class="form-group">
                    <label>Semana de gestación (1-40):</label>
                    <input type="number" id="semana" min="1" max="40" disabled>
                </div>
                <div class="form-group">
                    <label>Peso Actual (kg):</label>
                    <input type="number" id="pesoActual" step="0.1" disabled>
                </div>
                <button id="btnAgregar" onclick="agregarRegistro()" disabled>Agregar Registro</button>
            </div>

            <div class="panel" style="max-height: 400px; overflow-y: auto;">
                <h2>Tabla de Monitoreo</h2>
                <table id="tablaRegistros">
                    <thead>
                        <tr>
                            <th>Semana</th>
                            <th>Peso (kg)</th>
                            <th>Total Ganado</th>
                            <th>Calificación</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Filas dinámicas -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Columna Derecha: Gráfica -->
        <div class="panel">
            <div class="chart-container">
                <canvas id="graficaMonitoreo"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // Datos de la Tabla de Recomendaciones (Min y Max) extraídos del PDF
    const tablaRecomendaciones = {
        1:[0.0,0.1], 2:[0.0,0.3], 3:[0.1,0.4], 4:[0.1,0.6], 5:[0.1,0.7], 6:[0.2,0.9], 7:[0.2,1.0], 8:[0.3,1.2], 9:[0.3,1.3], 10:[0.3,1.5],
        11:[0.4,1.6], 12:[0.4,1.8], 13:[0.5,2.0], 14:[0.9,2.5], 15:[1.3,3.1], 16:[1.8,3.7], 17:[2.2,4.3], 18:[2.7,4.9], 19:[3.1,5.5], 20:[3.6,6.1],
        21:[4.0,6.7], 22:[4.4,7.3], 23:[4.9,7.9], 24:[5.3,8.5], 25:[5.8,9.1], 26:[6.2,9.7], 27:[6.7,10.2], 28:[7.1,10.8], 29:[7.6,11.4], 30:[8.0,12.0],
        31:[8.4,12.6], 32:[8.9,13.2], 33:[9.3,13.8], 34:[9.8,14.4], 35:[10.2,15.0], 36:[10.7,15.6], 37:[11.1,16.2], 38:[11.6,16.8], 39:[12.0,17.4], 40:[12.5,18.0]
    };

    let pesoPregestacional = 0;
    let registrosUsuario = []; // Almacenará {semana, peso, ganancia, calificacion}
    let chartInstance = null;

    // Inicializar la Gráfica
    function initChart() {
        const ctx = document.getElementById('graficaMonitoreo').getContext('2d');
        
        const semanas = Array.from({length: 40}, (_, i) => i + 1);
        const dataMin = semanas.map(s => tablaRecomendaciones[s][0]);
        const dataMax = semanas.map(s => tablaRecomendaciones[s][1]);

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: semanas,
                datasets: [
                    {
                        label: 'Límite Superior',
                        data: dataMax,
                        borderColor: 'transparent',
                        backgroundColor: 'rgba(235, 150, 150, 0.4)', // Rosa translúcido
                        fill: '+1', // Rellena hasta el dataset siguiente (Límite Inferior)
                        pointRadius: 0,
                        tension: 0.1
                    },
                    {
                        label: 'Límite Inferior',
                        data: dataMin,
                        borderColor: 'transparent',
                        backgroundColor: 'transparent',
                        fill: false,
                        pointRadius: 0,
                        tension: 0.1
                    },
                    {
                        label: 'Ganancia del Paciente (kg)',
                        data: [], // Se llena dinámicamente
                        borderColor: 'black',
                        backgroundColor: 'black',
                        borderWidth: 2,
                        pointRadius: 4,
                        fill: false,
                        tension: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: { display: true, text: 'Semanas de gestación' },
                        grid: { color: '#ccc' },
                        ticks: { stepSize: 1 }
                    },
                    y: {
                        title: { display: true, text: 'Ganancia de Peso (kg)' },
                        min: -4,
                        max: 25,
                        grid: { color: '#ccc' },
                        ticks: { stepSize: 1 }
                    }
                },
                plugins: {
                    legend: { display: false } // Ocultamos la leyenda para parecerse al PDF
                }
            }
        });
    }

    function fijarDatosBase() {
        const pesoPGInput = parseFloat(document.getElementById('pesoPG').value);
        const tallaInput = parseFloat(document.getElementById('talla').value);

        if (!pesoPGInput || !tallaInput) {
            alert("Por favor ingrese el Peso Pregestacional y la Talla.");
            return;
        }

        const imc = pesoPGInput / (tallaInput * tallaInput);
        
        if(imc >= 18.5) {
            alert("Advertencia: Esta ficha es para pacientes con DELGADEZ (IMC < 18.5). El IMC calculado es " + imc.toFixed(1));
        }

        pesoPregestacional = pesoPGInput;
        document.getElementById('infoIMC').innerHTML = `IMC PG: ${imc.toFixed(1)} kg/m² | Peso Base: ${pesoPregestacional} kg`;
        
        // Habilitar ingresos semanales
        document.getElementById('semana').disabled = false;
        document.getElementById('pesoActual').disabled = false;
        document.getElementById('btnAgregar').disabled = false;
    }

    function evaluarCalificacion(semana, ganancia) {
        const limites = tablaRecomendaciones[semana];
        if (!limites) return "-";
        if (ganancia < limites[0]) return "Bajo";
        if (ganancia > limites[1]) return "Alto";
        return "Adec.";
    }

    function agregarRegistro() {
        const semana = parseInt(document.getElementById('semana').value);
        const pesoActual = parseFloat(document.getElementById('pesoActual').value);

        if (!semana || semana < 1 || semana > 40) {
            alert("Semana inválida (1 a 40)"); return;
        }
        if (!pesoActual) {
            alert("Ingrese el peso actual"); return;
        }

        // Revisar si la semana ya existe y actualizarla
        const existente = registrosUsuario.findIndex(r => r.semana === semana);
        const ganancia = (pesoActual - pesoPregestacional).toFixed(2);
        const calificacion = evaluarCalificacion(semana, ganancia);

        const nuevoRegistro = {
            semana: semana,
            peso: pesoActual,
            ganancia: parseFloat(ganancia),
            calificacion: calificacion
        };

        if (existente >= 0) {
            registrosUsuario[existente] = nuevoRegistro;
        } else {
            registrosUsuario.push(nuevoRegistro);
        }

        // Ordenar por semana
        registrosUsuario.sort((a, b) => a.semana - b.semana);

        actualizarTabla();
        actualizarGrafica();
        
        // Limpiar inputs
        document.getElementById('semana').value = semana + 1; // Prepara para la sgt semana
        document.getElementById('pesoActual').value = "";
    }

    function eliminarRegistro(semana) {
        registrosUsuario = registrosUsuario.filter(r => r.semana !== semana);
        actualizarTabla();
        actualizarGrafica();
    }

    function actualizarTabla() {
        const tbody = document.querySelector("#tablaRegistros tbody");
        tbody.innerHTML = "";

        registrosUsuario.forEach(reg => {
            let claseEstatus = "";
            if (reg.calificacion === "Bajo") claseEstatus = "status-bajo";
            if (reg.calificacion === "Alto") claseEstatus = "status-alto";
            if (reg.calificacion === "Adec.") claseEstatus = "status-adec";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${reg.semana}</td>
                <td>${reg.peso}</td>
                <td>${reg.ganancia > 0 ? '+' : ''}${reg.ganancia}</td>
                <td class="${claseEstatus}">${reg.calificacion}</td>
                <td><button onclick="eliminarRegistro(${reg.semana})" style="padding:2px 5px; margin:0; background:#d9534f;">X</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function actualizarGrafica() {
        // Crear un array de datos para la gráfica (null para semanas sin datos)
        let datosGrafica = Array.from({length: 40}, () => null);
        registrosUsuario.forEach(reg => {
            datosGrafica[reg.semana - 1] = reg.ganancia;
        });

        // Actualizar el dataset 2 (índice 2) que pertenece al paciente
        chartInstance.data.datasets[2].data = datosGrafica;
        chartInstance.update();
    }

    // Iniciar
    window.onload = initChart;

</script>

</body>
</html>
